<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Battle Plan Editor</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d1117; --bg2: #161b22; --card: #1c2128; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
      --army: #3fb950; --navy: #388bfd; --air: #d29922;
      --ce: #e3b341; --mm: #bc8cff; --tag: #21262d;
      --shadow: rgba(0,0,0,.45); --success: #3fb950; --danger: #f85149;
    }
    :root[data-theme="light"] {
      --bg: #f6f8fa; --bg2: #ffffff; --card: #ffffff; --border: #d0d7de;
      --text: #1f2328; --muted: #656d76; --accent: #1f75d4;
      --army: #1a7f37; --navy: #0550ae; --air: #9a6700;
      --ce: #7d4e00; --mm: #6e40c9; --tag: #eaeef2;
      --shadow: rgba(140,149,159,.2); --success: #1a7f37; --danger: #cf222e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: .85rem 2rem; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200; box-shadow: 0 1px 0 var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 1.2rem; }
    .header-title { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .header-sub { font-size: .75rem; color: var(--muted); margin-top: 3px; }
    .nav-link {
      font-size: .8rem; color: var(--muted); text-decoration: none; padding: .35rem .8rem;
      border: 1px solid var(--border); border-radius: 7px; transition: all .15s;
    }
    .nav-link:hover { border-color: var(--accent); color: var(--accent); }
    .header-actions { display: flex; gap: .6rem; align-items: center; }
    .hdr-btn {
      background: var(--tag); border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: .38rem .9rem; cursor: pointer; font-size: .8rem;
      display: flex; align-items: center; gap: .4rem; transition: all .15s; white-space: nowrap;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
    .save-btn {
      background: var(--accent); border: 1px solid var(--accent); color: #fff;
      border-radius: 8px; padding: .45rem 1.2rem; cursor: pointer; font-size: .82rem;
      font-weight: 600; transition: all .15s; white-space: nowrap;
    }
    .save-btn:hover { filter: brightness(1.15); }
    .save-btn:disabled { opacity: .5; cursor: not-allowed; }

    main { max-width: 1440px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

    /* Name prompt modal */
    .name-modal-bg {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
      z-index: 300; align-items: center; justify-content: center;
    }
    .name-modal-bg.open { display: flex; }
    .name-modal {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.5rem; width: 380px; max-width: 95vw;
      box-shadow: 0 20px 60px var(--shadow); text-align: center;
    }
    .name-modal h3 { font-size: .95rem; font-weight: 700; margin-bottom: .6rem; color: var(--accent); }
    .name-modal p { font-size: .8rem; color: var(--muted); margin-bottom: 1rem; line-height: 1.4; }
    .name-modal input {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: .6rem 1rem; color: var(--text); font-size: .85rem; outline: none;
    }
    .name-modal input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
    .name-modal-actions { display: flex; gap: .6rem; justify-content: center; margin-top: 1rem; }
    .name-modal-actions button {
      padding: .45rem 1.2rem; border-radius: 8px; font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .nm-cancel { background: var(--tag); border: 1px solid var(--border); color: var(--muted); }
    .nm-cancel:hover { border-color: var(--accent); color: var(--accent); }
    .nm-confirm { background: var(--accent); border: 1px solid var(--accent); color: #fff; }
    .nm-confirm:hover { filter: brightness(1.15); }

    .squad-tabs {
      display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem;
      padding: .9rem 1.25rem; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; align-items: center;
    }
    .squad-tabs-label {
      font-size: .72rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-right: .25rem;
    }
    .tab-btn {
      padding: .4rem 1rem; border-radius: 8px; border: 1px solid var(--border);
      background: var(--tag); color: var(--muted); cursor: pointer;
      font-size: .82rem; font-weight: 500; transition: all .15s;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    .plan-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
    @media (max-width: 960px) { .plan-layout { grid-template-columns: 1fr; } }

    .panel {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem;
    }
    .panel h3 {
      font-size: .72rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 1rem;
    }

    /* Diamond Map */
    .diamond-grid { position: relative; width: 100%; max-width: 420px; margin: 0 auto; aspect-ratio: 1; }
    .map-node {
      position: absolute; transform: translate(-50%,-50%);
      width: 22%; height: 18%; background: var(--bg2); border: 2px solid var(--border);
      border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 4px; transition: all .15s; cursor: pointer;
    }
    .map-node:hover { border-color: var(--accent); }
    .map-node.filled { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--bg2)); }
    .map-node .num { font-weight: 700; font-size: .9rem; color: var(--accent); line-height: 1; }
    .map-node .role { font-size: .5rem; color: var(--muted); line-height: 1.1; margin-top: 1px; }
    .map-node .player { font-size: .6rem; font-weight: 600; color: var(--text); margin-top: 2px; }
    .map-node .fdot { position: absolute; top: 3px; right: 3px; width: 6px; height: 6px; border-radius: 50%; }
    .map-hub {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
      width: 28%; height: 28%; background: var(--tag); border: 1px dashed var(--border); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; text-align: center;
      font-size: .6rem; color: var(--muted); padding: 4px; line-height: 1.2;
    }
    .map-select-overlay {
      position: absolute; transform: translate(-50%,-50%); width: 28%; z-index: 10;
    }
    .map-select-overlay select {
      width: 100%; background: var(--bg2); border: 2px solid var(--accent);
      border-radius: 6px; color: var(--text); padding: .35rem .3rem; font-size: .68rem;
      outline: none; cursor: pointer;
    }
    .assign-item.highlight { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--bg2)); }
    .pos-role-label { font-size: .62rem; color: var(--muted); flex-shrink: 0; }
    .map-legend {
      display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; font-size: .7rem; color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: .3rem; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid var(--border); }

    /* Assignment editor */
    .assign-section { margin-bottom: 1.1rem; }
    .assign-section:last-child { margin-bottom: 0; }
    .assign-header {
      font-size: .78rem; font-weight: 700; color: var(--text); margin-bottom: .5rem;
      padding-bottom: .35rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .add-btn {
      background: var(--tag); border: 1px solid var(--border); color: var(--accent);
      border-radius: 6px; padding: 2px 8px; cursor: pointer; font-size: .7rem; transition: all .15s;
    }
    .add-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .assign-note { font-size: .68rem; color: var(--muted); font-style: italic; margin-top: .3rem; }
    .assign-list { list-style: none; display: flex; flex-direction: column; gap: 3px; }
    .assign-item {
      display: flex; align-items: center; gap: .5rem; padding: .3rem .6rem;
      border-radius: 6px; font-size: .8rem; background: var(--bg2); border: 1px solid var(--border);
    }
    .slot-label { color: var(--muted); font-size: .68rem; min-width: 1.4rem; font-weight: 600; }
    .player-select {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text); padding: .25rem .5rem; font-size: .78rem; outline: none;
      appearance: none; -webkit-appearance: none; cursor: pointer;
    }
    .player-select:focus { border-color: var(--accent); }
    .remove-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: .85rem; padding: 0 2px; transition: color .15s;
    }
    .remove-btn:hover { color: var(--danger); }

    .notes-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .notes-card h3 {
      font-size: .72rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: .8rem;
    }
    .notes-card textarea {
      width: 100%; min-height: 100px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: .7rem; color: var(--text); font-size: .82rem;
      font-family: inherit; outline: none; resize: vertical;
    }
    .notes-card textarea:focus { border-color: var(--accent); }

    /* Status bar */
    .status-bar {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2);
      border-top: 1px solid var(--border); padding: .6rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      font-size: .78rem; z-index: 100;
    }
    .status-bar.hidden { display: none; }
    .status-text { color: var(--muted); }
    .status-text.saving { color: var(--accent); }
    .status-text.saved { color: var(--success); }
    .status-text.error { color: var(--danger); }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Roster Manager */
    .roster-mgr { margin-top: 2rem; }
    .roster-mgr-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .roster-mgr-header h3 {
      font-size: .85rem; font-weight: 700; color: var(--accent);
    }
    .roster-search {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: .35rem .7rem; font-size: .78rem; outline: none; width: 180px;
    }
    .roster-search:focus { border-color: var(--accent); }
    .roster-table-wrap {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      overflow: auto; max-height: 420px;
    }
    .roster-table { width: 100%; border-collapse: collapse; font-size: .75rem; }
    .roster-table th {
      position: sticky; top: 0; background: var(--bg2); color: var(--muted);
      font-size: .65rem; text-transform: uppercase; letter-spacing: .04em;
      padding: .5rem .6rem; text-align: left; border-bottom: 1px solid var(--border);
    }
    .roster-table td { padding: .4rem .6rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .roster-table tr:hover td { background: var(--tag); }
    .roster-table .move-row td { background: var(--move-bg, rgba(210,153,34,.07)); }
    .roster-actions { display: flex; gap: 4px; }
    .roster-actions button {
      background: var(--tag); border: 1px solid var(--border); color: var(--muted);
      border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: .68rem; transition: all .15s;
    }
    .roster-actions button:hover { border-color: var(--accent); color: var(--accent); }
    .roster-actions .del-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* Player Modal */
    .player-modal-bg {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
      z-index: 300; align-items: center; justify-content: center;
    }
    .player-modal-bg.open { display: flex; }
    .player-modal {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.5rem; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px var(--shadow);
    }
    .player-modal h3 { font-size: .95rem; font-weight: 700; margin-bottom: 1rem; color: var(--accent); }
    .pm-row { display: flex; gap: .8rem; margin-bottom: .7rem; }
    .pm-field { display: flex; flex-direction: column; flex: 1; }
    .pm-field label { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; }
    .pm-field input, .pm-field select {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: .4rem .6rem; font-size: .8rem; outline: none;
    }
    .pm-field input:focus, .pm-field select:focus { border-color: var(--accent); }
    .pm-checks { display: flex; gap: 1rem; flex-wrap: wrap; }
    .pm-check { display: flex; align-items: center; gap: .3rem; font-size: .78rem; }
    .pm-check input { accent-color: var(--accent); }
    .pm-actions { display: flex; gap: .6rem; justify-content: flex-end; margin-top: 1.2rem; }
    .pm-actions button {
      padding: .45rem 1.2rem; border-radius: 8px; font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .pm-cancel { background: var(--tag); border: 1px solid var(--border); color: var(--muted); }
    .pm-cancel:hover { border-color: var(--accent); color: var(--accent); }
    .pm-save { background: var(--accent); border: 1px solid var(--accent); color: #fff; }
    .pm-save:hover { filter: brightness(1.15); }

    @media (max-width: 640px) {
      main { padding: 1rem 1rem 2rem; }
      header { padding: .7rem 1rem; flex-wrap: wrap; gap: .5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="header-title">&#9876; Battle Plan Editor</div>
      <div class="header-sub">Admin &ndash; Server 2864</div>
    </div>
    <a href="battle-plan.html" class="nav-link">View Plan &rarr;</a>
    <a href="changelog.html" class="nav-link">Changelog</a>
  </div>
  <div class="header-actions">
    <button class="hdr-btn" onclick="toggleTheme()">
      <span id="themeIcon">&#9728;&#65039;</span>
      <span id="themeLabel">Light Mode</span>
    </button>
    <button class="save-btn" id="saveBtn" onclick="promptSave()">Save &amp; Publish</button>
  </div>
</header>

<main>
  <!-- Editor -->
  <div id="editor">
    <div class="squad-tabs" id="squadTabs">
      <span class="squad-tabs-label">Squad</span>
    </div>
    <div id="editorContent"></div>

    <!-- Roster Manager -->
    <div class="roster-mgr" id="rosterMgr">
      <div class="roster-mgr-header">
        <h3>Manage Roster</h3>
        <div style="display:flex;gap:.5rem;align-items:center">
          <input class="roster-search" id="rosterSearch" placeholder="Search players..." oninput="renderRosterTable()">
          <button class="add-btn" style="padding:4px 12px;font-size:.75rem" onclick="openPlayerModal(-1)">+ Add Player</button>
        </div>
      </div>
      <div class="roster-table-wrap">
        <table class="roster-table">
          <thead><tr>
            <th>Name</th><th>Squad</th><th>Alliance</th><th>Unit</th><th>Prof</th><th>CP</th><th>UC</th><th>Notes</th><th>Avail</th><th></th>
          </tr></thead>
          <tbody id="rosterBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Player Add/Edit Modal -->
<div class="player-modal-bg" id="playerModalBg" onclick="if(event.target===this)closePlayerModal()">
  <div class="player-modal">
    <h3 id="pmTitle">Add Player</h3>
    <input type="hidden" id="pmIdx" value="-1">
    <div class="pm-row">
      <div class="pm-field"><label>Name</label><input id="pmName"></div>
      <div class="pm-field"><label>Squad</label>
        <select id="pmSquad">
          <option value="Dog Squad A">Dog Squad A</option>
          <option value="Dog Squad B">Dog Squad B</option>
          <option value="MSS Squad A">MSS Squad A</option>
          <option value="MSS Squad B">MSS Squad B</option>
          <option value="PRU Squad A">PRU Squad A</option>
        </select>
      </div>
    </div>
    <div class="pm-row">
      <div class="pm-field"><label>Alliance</label>
        <select id="pmAlliance">
          <option value="DOG">DOG</option>
          <option value="MSS">MSS</option>
          <option value="Cat+">Cat+</option>
        </select>
      </div>
      <div class="pm-field"><label>Unit</label>
        <select id="pmUnit">
          <option value="Army">Army</option>
          <option value="Navy">Navy</option>
          <option value="Air Force">Air Force</option>
        </select>
      </div>
    </div>
    <div class="pm-row">
      <div class="pm-field"><label>Profession</label>
        <select id="pmProf">
          <option value="CE">CE</option>
          <option value="MM">MM</option>
        </select>
      </div>
      <div class="pm-field"><label>March CP</label><input id="pmCP" type="number" min="0"></div>
      <div class="pm-field"><label>UC Level</label><input id="pmUC" placeholder="0-5 or blank"></div>
    </div>
    <div class="pm-row">
      <div class="pm-field" style="flex:2"><label>Notes (e.g. "Move to PRU by Thu +10")</label><input id="pmNotes"></div>
    </div>
    <div class="pm-row">
      <div class="pm-field">
        <label>Availability</label>
        <div class="pm-checks">
          <label class="pm-check"><input type="checkbox" id="pmS6"> -6</label>
          <label class="pm-check"><input type="checkbox" id="pmS2n"> -2</label>
          <label class="pm-check"><input type="checkbox" id="pmS2p"> +2</label>
          <label class="pm-check"><input type="checkbox" id="pmS10"> +10</label>
        </div>
      </div>
    </div>
    <div class="pm-actions">
      <button class="pm-cancel" onclick="closePlayerModal()">Cancel</button>
      <button class="pm-save" onclick="savePlayer()">Save Player</button>
    </div>
  </div>
</div>

<!-- Name Prompt Modal -->
<div class="name-modal-bg" id="nameModalBg" onclick="if(event.target===this)closeNameModal()">
  <div class="name-modal">
    <h3>Publish Changes</h3>
    <p>Enter your name so we can track who made this update.</p>
    <input type="text" id="editorNameInput" placeholder="Your name" autocomplete="off">
    <div class="name-modal-actions">
      <button class="nm-cancel" onclick="closeNameModal()">Cancel</button>
      <button class="nm-confirm" onclick="confirmSave()">Publish</button>
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <span class="status-text" id="statusText"></span>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// IMPORTANT: Replace this URL with your deployed Cloudflare Worker URL
const WORKER_URL = "https://battle-plan-proxy.27tb8s6fct.workers.dev";

// ── PLAYER DATA (loaded dynamically) ──────────────────────────────────────────
let RAW = [];
let players = [];

function rebuildPlayers() {
  players = RAW.map(r=>({name:r[0],notes:r[1],unit:r[7],cp:r[8],prof:r[9],ucLvl:r[10],squad:r[11],alliance:r[6]}));
}

async function loadRoster() {
  try {
    const res = await fetch("roster-data.json?t=" + Date.now());
    if (res.ok) RAW = await res.json();
  } catch {}
  rebuildPlayers();
}

const SQUADS = ["Dog Squad A","Dog Squad B","MSS Squad A","MSS Squad B","PRU Squad A"];
const SQUAD_SHORT = {"Dog Squad A":"Dog A (+10)","Dog Squad B":"Dog B (-2)","MSS Squad A":"MSS A (+2)","MSS Squad B":"MSS B (+10)","PRU Squad A":"PRU A (-6)"};

const POSITIONS = [
  { num:1, role:"Bigger CE", color:"#3fb950", x:22, y:22 },
  { num:2, role:"Medium-strong CE", color:"#3fb950", x:78, y:78 },
  { num:3, role:"MM + Urgent Care", color:"#d29922", x:5, y:50 },
  { num:4, role:"MM + Urgent Care", color:"#d29922", x:50, y:5 },
  { num:5, role:"MM + Urgent Care", color:"#d29922", x:50, y:95 },
  { num:6, role:"MM + Urgent Care", color:"#d29922", x:95, y:50 },
  { num:7, role:"Any MM, no urgent care (4 towers)", color:"#3fb950", x:22, y:78 },
  { num:8, role:"Any MM, no urgent care (4 towers)", color:"#d29922", x:78, y:22 },
];

const POS_GROUPS = [
  { title:"CE Positions (Map #1–2)", nums:[1,2], prof:"CE" },
  { title:"MM Positions (Map #3–8)", nums:[3,4,5,6,7,8], prof:"MM" },
];

const SECTIONS = [
  { key:"goon", title:"CE Goon Squad", defaults:4, note:"Go on offense / run around freely" },
  { key:"standby", title:"Standby (Fill as Needed)", defaults:5 },
  { key:"hover", title:"Hover Captains", defaults:2, note:"Make sure people get to hover station every round / notify when it's bounty time" },
  { key:"crystal", title:"Crystal Lab Captains", defaults:2, note:"Track open labs, share labs that need help" },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let planData = {};
let activeSquad = "";
let dirty = false;
let pendingSaveType = ""; // "plan" or "roster"
let pendingDetail = "";   // detail string for changelog

function esc(s) { return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function toggleTheme() {
  const d = document.documentElement.getAttribute("data-theme") === "dark";
  document.documentElement.setAttribute("data-theme", d ? "light" : "dark");
  document.getElementById("themeIcon").textContent = d ? "\uD83C\uDF19" : "\u2600\uFE0F";
  document.getElementById("themeLabel").textContent = d ? "Dark Mode" : "Light Mode";
}

// ── INIT (no auth gate — load editor immediately) ────────────────────────────
(async function init() {
  await Promise.all([loadData(), loadRoster()]);
  buildTabs();
  selectSquad(SQUADS[0]);
  renderRosterTable();
})();

// ── WORKER API ────────────────────────────────────────────────────────────────
async function loadData() {
  setStatus("Loading data...", "saving");
  try {
    const res = await fetch(WORKER_URL);
    if (res.ok) {
      const result = await res.json();
      planData = result.data || {};
    } else {
      planData = {};
    }
    setStatus("Loaded", "saved");
  } catch (e) {
    setStatus("Failed to load: " + e.message, "error");
    planData = {};
  }
}

// ── NAME PROMPT & SAVE ────────────────────────────────────────────────────────
function promptSave() {
  pendingSaveType = "plan";
  const nameInput = document.getElementById("editorNameInput");
  nameInput.value = localStorage.getItem("editor_name") || "";
  document.getElementById("nameModalBg").classList.add("open");
  nameInput.focus();
}

function closeNameModal() {
  document.getElementById("nameModalBg").classList.remove("open");
}

async function confirmSave() {
  const name = document.getElementById("editorNameInput").value.trim();
  if (!name) { alert("Please enter your name."); return; }
  localStorage.setItem("editor_name", name);
  closeNameModal();

  if (pendingSaveType === "roster") {
    await doSaveRoster(name);
  } else {
    await doSavePlan(name);
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter" && document.getElementById("nameModalBg").classList.contains("open")) confirmSave();
});

async function doSavePlan(editorName) {
  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  setStatus("Saving & publishing...", "saving");
  collectNotes();

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data: planData })
    });
    if (!res.ok) {
      const result = await res.json();
      throw new Error(result.error || "Save failed");
    }
    await appendChangelog(editorName, "Updated battle plan", buildPlanDetails());
    dirty = false;
    setStatus("Published! GitHub Pages will update in ~1 min.", "saved");
  } catch (e) {
    setStatus("Error: " + e.message, "error");
  }
  btn.disabled = false;
}

function buildPlanDetails() {
  const lines = [];
  lines.push("Squad: " + (SQUAD_SHORT[activeSquad] || activeSquad));
  const data = getSquadData(activeSquad);
  // Summarize positions
  const posNames = POSITIONS.map(p => data.positions[p.num]).filter(Boolean);
  if (posNames.length) lines.push("Positions filled: " + posNames.join(", "));
  // Summarize sections
  SECTIONS.forEach(s => {
    const filled = (data[s.key] || []).filter(Boolean);
    if (filled.length) lines.push(s.title + ": " + filled.join(", "));
  });
  if (data.notes) lines.push("Notes: " + data.notes.slice(0, 120));
  return lines.join("\n");
}

async function appendChangelog(editorName, action, details) {
  try {
    // Load current changelog
    let changelog = [];
    try {
      const res = await fetch("changelog-data.json?t=" + Date.now());
      if (res.ok) changelog = await res.json();
    } catch {}
    // Append new entry
    const entry = { timestamp: new Date().toISOString(), editor: editorName, action };
    if (details) entry.details = details;
    changelog.unshift(entry);
    // Keep last 200 entries
    if (changelog.length > 200) changelog = changelog.slice(0, 200);
    // Save
    await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data: changelog, path: "changelog-data.json" })
    });
  } catch {}
}

function setStatus(msg, cls) {
  const el = document.getElementById("statusText");
  el.textContent = msg;
  el.className = "status-text " + (cls || "");
}

// ── SQUAD DATA ────────────────────────────────────────────────────────────────
function getSquadData(sq) {
  if (!planData[sq]) {
    planData[sq] = { positions: {} };
    SECTIONS.forEach(s => { planData[sq][s.key] = Array(s.defaults).fill(""); });
    planData[sq].notes = "";
  }
  return planData[sq];
}

function getSquadPlayers(sq) {
  return players.filter(p => p.squad === sq).sort((a, b) => b.cp - a.cp);
}

function getUsedNames(data, excludeKey, excludeIdx) {
  const used = new Set();
  // Positions
  if (data.positions) {
    Object.entries(data.positions).forEach(([k, v]) => {
      if (v && !(excludeKey === "pos" && String(excludeIdx) === String(k))) used.add(v);
    });
  }
  // Sections
  SECTIONS.forEach(s => {
    (data[s.key] || []).forEach((v, i) => {
      if (v && !(excludeKey === s.key && excludeIdx === i)) used.add(v);
    });
  });
  return used;
}

function playerOptHtml(sqPlayers, selected, filterProf, usedNames) {
  let h = '<option value="">-- Select --</option>';
  const list = filterProf ? sqPlayers.filter(p => p.prof === filterProf) : sqPlayers;
  list.forEach(p => {
    if (usedNames && usedNames.has(p.name) && p.name !== selected) return;
    const sel = p.name === selected ? " selected" : "";
    h += `<option value="${esc(p.name)}"${sel}>${esc(p.name)} (${esc(p.cp)} ${esc(p.prof)} ${esc(p.unit)})</option>`;
  });
  return h;
}

// ── UI ────────────────────────────────────────────────────────────────────────
function buildTabs() {
  const c = document.getElementById("squadTabs");
  SQUADS.forEach(sq => {
    const btn = document.createElement("button");
    btn.className = "tab-btn";
    btn.textContent = SQUAD_SHORT[sq];
    btn.dataset.squad = sq;
    btn.onclick = () => selectSquad(sq);
    c.appendChild(btn);
  });
}

function selectSquad(sq) {
  collectNotes(); // save notes from previous squad
  activeSquad = sq;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.squad === sq));
  renderEditor();
}

function collectNotes() {
  if (!activeSquad) return;
  const ta = document.getElementById("squadNotes");
  if (ta) { getSquadData(activeSquad).notes = ta.value; }
}

function markDirty() { dirty = true; setStatus("Unsaved changes", ""); }

function renderEditor() {
  const data = getSquadData(activeSquad);
  const sqPlayers = getSquadPlayers(activeSquad);
  const el = document.getElementById("editorContent");

  el.innerHTML = `
    <div class="plan-layout">
      <div class="panel">
        <h3>Battle Map &mdash; ${esc(SQUAD_SHORT[activeSquad])}</h3>
        <div class="diamond-grid" id="mapGrid"></div>
        <div class="map-legend">
          <div class="legend-item"><div class="legend-swatch" style="background:#3fb950"></div> Strengthening</div>
          <div class="legend-item"><div class="legend-swatch" style="background:#d29922"></div> Urgent Care</div>
        </div>
      </div>
      <div class="panel">
        <h3>Roster Assignments</h3>
        ${POS_GROUPS.map(g => `
          <div class="assign-section">
            <div class="assign-header">${esc(g.title)}</div>
            <ul class="assign-list" id="list_pos_${g.prof}"></ul>
          </div>
        `).join("")}
        ${SECTIONS.map(s => `
          <div class="assign-section">
            <div class="assign-header">${esc(s.title)} <button class="add-btn" onclick="addSlot('${s.key}')">+ Add</button></div>
            <ul class="assign-list" id="list_${s.key}"></ul>
            ${s.note ? `<div class="assign-note">${esc(s.note)}</div>` : ""}
          </div>
        `).join("")}
      </div>
    </div>
    <div class="notes-card">
      <h3>Squad Notes &amp; Instructions</h3>
      <textarea id="squadNotes" placeholder="Add battle plan notes, reminders, or instructions...">${esc(data.notes || "")}</textarea>
    </div>
  `;

  document.getElementById("squadNotes").addEventListener("input", markDirty);
  renderMap(data, sqPlayers);
  renderAllSlots(data, sqPlayers);
}

function posProf(num) { return num <= 2 ? "CE" : "MM"; }

function renderMap(data, sqPlayers) {
  const grid = document.getElementById("mapGrid");
  grid.innerHTML = "";

  const hub = document.createElement("div");
  hub.className = "map-hub";
  hub.textContent = "Discarded Repository / Nexus Hub";
  grid.appendChild(hub);

  POSITIONS.forEach(pos => {
    const assigned = data.positions[pos.num] || "";
    const node = document.createElement("div");
    node.className = "map-node" + (assigned ? " filled" : "");
    node.style.left = pos.x + "%";
    node.style.top = pos.y + "%";
    node.innerHTML = `
      <span class="num">${pos.num}</span>
      <span class="role">${esc(pos.role)}</span>
      ${assigned ? `<span class="player">${esc(assigned)}</span>` : ""}
    `;
    node.onclick = (e) => {
      e.stopPropagation();
      // Remove any existing map select overlay
      document.querySelectorAll(".map-select-overlay").forEach(el => el.remove());
      // Create floating select
      const wrap = document.createElement("div");
      wrap.className = "map-select-overlay";
      wrap.style.left = pos.x + "%";
      wrap.style.top = pos.y + "%";
      const sel = document.createElement("select");
      sel.innerHTML = playerOptHtml(sqPlayers, assigned, posProf(pos.num), getUsedNames(data, "pos", pos.num));
      sel.onchange = () => {
        data.positions[pos.num] = sel.value;
        markDirty();
        wrap.remove();
        renderMap(data, sqPlayers);
        renderAllSlots(data, sqPlayers);
      };
      sel.onblur = () => wrap.remove();
      wrap.appendChild(sel);
      grid.appendChild(wrap);
      sel.focus();
      // Highlight corresponding roster row
      highlightPosRow(pos.num);
    };
    grid.appendChild(node);
  });

  // Close overlay on outside click
  grid.onclick = (e) => {
    if (e.target === grid) {
      document.querySelectorAll(".map-select-overlay").forEach(el => el.remove());
    }
  };
}

function highlightPosRow(num) {
  document.querySelectorAll(".assign-item.highlight").forEach(el => el.classList.remove("highlight"));
  const row = document.getElementById("pos_row_" + num);
  if (row) {
    row.classList.add("highlight");
    row.scrollIntoView({ behavior: "smooth", block: "nearest" });
    setTimeout(() => row.classList.remove("highlight"), 1500);
  }
}

function renderPositionSlots(data, sqPlayers) {
  POS_GROUPS.forEach(g => {
    const list = document.getElementById("list_pos_" + g.prof);
    const posInfo = POSITIONS.filter(p => g.nums.includes(p.num));
    list.innerHTML = posInfo.map(pos => {
      const used = getUsedNames(data, "pos", pos.num);
      return `
      <li class="assign-item" id="pos_row_${pos.num}">
        <span class="slot-label">#${pos.num}</span>
        <span class="pos-role-label">${esc(pos.role)}</span>
        <select class="player-select" onchange="updatePosition(${pos.num},this.value)">
          ${playerOptHtml(sqPlayers, data.positions[pos.num] || "", g.prof, used)}
        </select>
      </li>`;
    }).join("");
  });
}

function updatePosition(num, val) {
  const data = getSquadData(activeSquad);
  data.positions[num] = val;
  markDirty();
  renderMap(data, getSquadPlayers(activeSquad));
  renderAllSlots(data, getSquadPlayers(activeSquad));
}

function renderAllSlots(data, sqPlayers) {
  renderPositionSlots(data, sqPlayers);
  SECTIONS.forEach(s => {
    const list = document.getElementById("list_" + s.key);
    const slots = data[s.key] || [];
    list.innerHTML = slots.map((val, i) => {
      const used = getUsedNames(data, s.key, i);
      return `
      <li class="assign-item">
        <span class="slot-label">#${i + 1}</span>
        <select class="player-select" onchange="updateSlot('${s.key}',${i},this.value)">
          ${playerOptHtml(sqPlayers, val, null, used)}
        </select>
        <button class="remove-btn" onclick="removeSlot('${s.key}',${i})" title="Remove">&times;</button>
      </li>
    `;
    }).join("");
  });
}

function updateSlot(key, idx, val) {
  const data = getSquadData(activeSquad);
  data[key][idx] = val;
  markDirty();
  renderMap(data, getSquadPlayers(activeSquad));
  renderAllSlots(data, getSquadPlayers(activeSquad));
}

function addSlot(key) {
  if (!activeSquad) return;
  getSquadData(activeSquad)[key].push("");
  markDirty();
  renderAllSlots(getSquadData(activeSquad), getSquadPlayers(activeSquad));
}

function removeSlot(key, idx) {
  if (!activeSquad) return;
  getSquadData(activeSquad)[key].splice(idx, 1);
  markDirty();
  renderAllSlots(getSquadData(activeSquad), getSquadPlayers(activeSquad));
}

// ── ROSTER MANAGEMENT ─────────────────────────────────────────────────────────
function renderRosterTable() {
  const q = (document.getElementById("rosterSearch").value || "").toLowerCase();
  const body = document.getElementById("rosterBody");
  const filtered = RAW.map((r, i) => [r, i]).filter(([r]) =>
    !q || r[0].toLowerCase().includes(q) || r[11].toLowerCase().includes(q) || r[1].toLowerCase().includes(q)
  );
  body.innerHTML = filtered.map(([r, i]) => {
    const isMove = /move to/i.test(r[1]);
    return `<tr class="${isMove ? "move-row" : ""}">
      <td><strong>${esc(r[0])}</strong></td>
      <td>${esc(r[11])}</td>
      <td>${esc(r[6])}</td>
      <td>${esc(r[7])}</td>
      <td>${esc(r[9])}</td>
      <td>${esc(r[8])}</td>
      <td>${esc(r[10])}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis" title="${esc(r[1])}">${esc(r[1]) || "&mdash;"}</td>
      <td>${r[2]==="y"?"-6 ":""}${r[3]==="y"?"-2 ":""}${r[4]==="y"?"+2 ":""}${r[5]==="y"?"+10":""}</td>
      <td class="roster-actions">
        <button onclick="openPlayerModal(${i})">Edit</button>
        <button class="del-btn" onclick="deletePlayer(${i})">Del</button>
      </td>
    </tr>`;
  }).join("");
}

function openPlayerModal(idx) {
  document.getElementById("pmIdx").value = idx;
  if (idx >= 0 && RAW[idx]) {
    const r = RAW[idx];
    document.getElementById("pmTitle").textContent = "Edit Player";
    document.getElementById("pmName").value = r[0];
    document.getElementById("pmNotes").value = r[1];
    document.getElementById("pmS6").checked = r[2] === "y";
    document.getElementById("pmS2n").checked = r[3] === "y";
    document.getElementById("pmS2p").checked = r[4] === "y";
    document.getElementById("pmS10").checked = r[5] === "y";
    document.getElementById("pmAlliance").value = r[6];
    document.getElementById("pmUnit").value = r[7];
    document.getElementById("pmCP").value = r[8];
    document.getElementById("pmProf").value = r[9];
    document.getElementById("pmUC").value = r[10];
    document.getElementById("pmSquad").value = r[11];
  } else {
    document.getElementById("pmTitle").textContent = "Add Player";
    document.getElementById("pmName").value = "";
    document.getElementById("pmNotes").value = "";
    document.getElementById("pmS6").checked = false;
    document.getElementById("pmS2n").checked = false;
    document.getElementById("pmS2p").checked = false;
    document.getElementById("pmS10").checked = false;
    document.getElementById("pmAlliance").value = "DOG";
    document.getElementById("pmUnit").value = "Army";
    document.getElementById("pmCP").value = "";
    document.getElementById("pmProf").value = "CE";
    document.getElementById("pmUC").value = "";
    document.getElementById("pmSquad").value = "Dog Squad A";
  }
  document.getElementById("playerModalBg").classList.add("open");
  document.getElementById("pmName").focus();
}

function closePlayerModal() {
  document.getElementById("playerModalBg").classList.remove("open");
}

function savePlayer() {
  const name = document.getElementById("pmName").value.trim();
  if (!name) { alert("Name is required"); return; }
  const row = [
    name,
    document.getElementById("pmNotes").value.trim(),
    document.getElementById("pmS6").checked ? "y" : "n",
    document.getElementById("pmS2n").checked ? "y" : "n",
    document.getElementById("pmS2p").checked ? "y" : "n",
    document.getElementById("pmS10").checked ? "y" : "n",
    document.getElementById("pmAlliance").value,
    document.getElementById("pmUnit").value,
    parseInt(document.getElementById("pmCP").value) || 0,
    document.getElementById("pmProf").value,
    document.getElementById("pmUC").value.trim(),
    document.getElementById("pmSquad").value,
  ];
  const idx = parseInt(document.getElementById("pmIdx").value);
  const isEdit = idx >= 0 && RAW[idx];
  if (isEdit) {
    RAW[idx] = row;
  } else {
    RAW.push(row);
  }
  RAW.sort((a, b) => a[0].localeCompare(b[0], undefined, { sensitivity: "base" }));
  rebuildPlayers();
  closePlayerModal();
  renderRosterTable();
  pendingDetail = (isEdit ? "Edited" : "Added") + " player: " + name + " (" + row[11] + ", " + row[9] + ", " + row[8] + " CP)";
  saveRosterToWorker();
  // Re-render battle plan selects with updated player list
  if (activeSquad) renderEditor();
}

function deletePlayer(idx) {
  const delName = RAW[idx][0];
  if (!confirm(`Delete ${delName}?`)) return;
  pendingDetail = "Deleted player: " + delName;
  RAW.splice(idx, 1);
  rebuildPlayers();
  renderRosterTable();
  saveRosterToWorker();
  if (activeSquad) renderEditor();
}

function saveRosterToWorker() {
  // Prompt for editor name before saving roster
  pendingSaveType = "roster";
  const nameInput = document.getElementById("editorNameInput");
  nameInput.value = localStorage.getItem("editor_name") || "";
  document.getElementById("nameModalBg").classList.add("open");
  nameInput.focus();
}

async function doSaveRoster(editorName) {
  setStatus("Saving roster...", "saving");
  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data: RAW, path: "roster-data.json" })
    });
    if (!res.ok) {
      const result = await res.json();
      throw new Error(result.error || "Roster save failed");
    }
    await appendChangelog(editorName, "Updated roster", pendingDetail);
    setStatus("Roster saved! Main page will update in ~1 min.", "saved");
  } catch (e) {
    setStatus("Roster error: " + e.message, "error");
  }
}

// Warn on leave with unsaved changes
window.addEventListener("beforeunload", e => {
  if (dirty) { e.preventDefault(); e.returnValue = ""; }
});
</script>
