<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Plan – Server 2864</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d1117; --bg2: #161b22; --card: #1c2128; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
      --army: #3fb950; --navy: #388bfd; --air: #d29922;
      --ce: #e3b341; --mm: #bc8cff; --tag: #21262d;
      --shadow: rgba(0,0,0,.45);
    }
    :root[data-theme="light"] {
      --bg: #f6f8fa; --bg2: #ffffff; --card: #ffffff; --border: #d0d7de;
      --text: #1f2328; --muted: #656d76; --accent: #1f75d4;
      --army: #1a7f37; --navy: #0550ae; --air: #9a6700;
      --ce: #7d4e00; --mm: #6e40c9; --tag: #eaeef2;
      --shadow: rgba(140,149,159,.2);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: .85rem 2rem; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200; box-shadow: 0 1px 0 var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 1.2rem; }
    .header-title { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .header-sub { font-size: .75rem; color: var(--muted); margin-top: 3px; }
    .nav-link {
      font-size: .8rem; color: var(--muted); text-decoration: none; padding: .35rem .8rem;
      border: 1px solid var(--border); border-radius: 7px; transition: all .15s;
    }
    .nav-link:hover { border-color: var(--accent); color: var(--accent); }
    .hdr-btn {
      background: var(--tag); border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: .38rem .9rem; cursor: pointer; font-size: .8rem;
      display: flex; align-items: center; gap: .4rem; transition: all .15s; white-space: nowrap;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

    main { max-width: 1440px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

    .squad-tabs {
      display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem;
      padding: .9rem 1.25rem; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; align-items: center;
    }
    .squad-tabs-label {
      font-size: .72rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-right: .25rem;
    }
    .tab-btn {
      padding: .4rem 1rem; border-radius: 8px; border: 1px solid var(--border);
      background: var(--tag); color: var(--muted); cursor: pointer;
      font-size: .82rem; font-weight: 500; transition: all .15s;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    .empty-state {
      text-align: center; padding: 4rem 2rem; color: var(--muted);
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    }
    .empty-state h3 { font-size: 1rem; margin-bottom: .5rem; color: var(--text); }

    .plan-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
    @media (max-width: 960px) { .plan-layout { grid-template-columns: 1fr; } }

    .panel {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem;
    }
    .panel h3 {
      font-size: .72rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 1rem;
    }

    /* Diamond Map */
    .diamond-grid { position: relative; width: 100%; max-width: 420px; margin: 0 auto; aspect-ratio: 1; }
    .map-node {
      position: absolute; transform: translate(-50%,-50%);
      width: 22%; height: 18%; background: var(--bg2); border: 2px solid var(--border);
      border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 4px; transition: all .15s;
    }
    .map-node.filled { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--bg2)); }
    .map-node .num { font-weight: 700; font-size: .9rem; color: var(--accent); line-height: 1; }
    .map-node .role { font-size: .5rem; color: var(--muted); line-height: 1.1; margin-top: 1px; }
    .map-node .player { font-size: .6rem; font-weight: 600; color: var(--text); margin-top: 2px; }
    .map-hub {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
      width: 28%; height: 28%; background: var(--tag); border: 1px dashed var(--border); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; text-align: center;
      font-size: .6rem; color: var(--muted); padding: 4px; line-height: 1.2;
    }

    /* Roster sections */
    .assign-section { margin-bottom: 1rem; }
    .assign-section:last-child { margin-bottom: 0; }
    .assign-title {
      font-size: .78rem; font-weight: 700; color: var(--text); margin-bottom: .4rem;
      padding-bottom: .3rem; border-bottom: 1px solid var(--border);
    }
    .assign-note { font-size: .68rem; color: var(--muted); font-style: italic; margin-top: .25rem; }
    .assign-list { list-style: none; display: flex; flex-direction: column; gap: 3px; }
    .assign-item {
      display: flex; align-items: center; gap: .5rem; padding: .3rem .6rem;
      border-radius: 6px; font-size: .8rem; background: var(--bg2); border: 1px solid var(--border);
    }
    .slot-label { color: var(--muted); font-size: .68rem; min-width: 1.4rem; font-weight: 600; }
    .slot-player { font-weight: 600; }
    .slot-empty { color: var(--muted); font-style: italic; font-size: .75rem; }

    /* Notes */
    .notes-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem;
    }
    .notes-card h3 {
      font-size: .72rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: .8rem;
    }
    .notes-body { font-size: .85rem; line-height: 1.5; white-space: pre-wrap; color: var(--text); min-height: 40px; }
    .notes-empty { color: var(--muted); font-style: italic; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 640px) {
      main { padding: 1rem 1rem 2rem; }
      header { padding: .7rem 1rem; flex-wrap: wrap; gap: .5rem; }
    }
    .site-footer { text-align: center; padding: 1.5rem 2rem; font-size: .75rem; color: var(--muted); border-top: 1px solid var(--border); }
    .site-footer a { color: var(--accent); text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="header-title">&#9876; Battle Plan</div>
      <div class="header-sub">Server 2864 &ndash; Titan Canyon</div>
    </div>
    <a href="index.html" class="nav-link" title="Home" style="padding:.35rem .6rem;display:inline-flex;align-items:center"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L10 3.5l7 7"/><path d="M5 9v7a1 1 0 001 1h3v-4h2v4h3a1 1 0 001-1V9"/></svg></a>
    <a href="index.html" class="nav-link">&larr; Rosters</a>
  </div>
  <div style="display:flex;gap:.6rem;align-items:center">
    <button class="hdr-btn" onclick="toggleTheme()">
      <span id="themeIcon">&#9728;&#65039;</span>
      <span id="themeLabel">Light Mode</span>
    </button>
  </div>
</header>

<main>
  <div class="squad-tabs">
    <span class="squad-tabs-label">Squad</span>
  </div>
  <div id="content"></div>
</main>

<footer class="site-footer">
  Brought to you by supporters of the fk boats movement<br>
  <a href="changelog.html">Changelog</a> &middot;
  <a href="https://github.com/texnottexas/titan-canyon-rosters" target="_blank" rel="noopener noreferrer">GitHub</a>
</footer>

<script>
const SQUADS = ["Dog Squad A","Dog Squad B","MSS Squad A","MSS Squad B","PRU Squad A"];
const SQUAD_SHORT = {"Dog Squad A":"Dog A (+10)","Dog Squad B":"Dog B (-2)","MSS Squad A":"MSS A (+2)","MSS Squad B":"MSS B (+10)","PRU Squad A":"PRU A (-6)"};

const POSITIONS = [
  { num: 1, role: "Bigger CE", color: "#3fb950", x: 22, y: 22 },
  { num: 2, role: "Medium-strong CE", color: "#3fb950", x: 78, y: 78 },
  { num: 3, role: "MM + Urgent Care", color: "#d29922", x: 5, y: 50 },
  { num: 4, role: "MM + Urgent Care", color: "#d29922", x: 50, y: 5 },
  { num: 5, role: "MM + Urgent Care", color: "#d29922", x: 50, y: 95 },
  { num: 6, role: "MM + Urgent Care", color: "#d29922", x: 95, y: 50 },
  { num: 7, role: "Any MM, no urgent care (4 towers)", color: "#3fb950", x: 22, y: 78 },
  { num: 8, role: "Any MM, no urgent care (4 towers)", color: "#d29922", x: 78, y: 22 },
];

const POS_GROUPS = [
  { title: "CE Positions (Map #1–2)", nums: [1, 2] },
  { title: "MM Positions (Map #3–8)", nums: [3, 4, 5, 6, 7, 8] },
];

const SECTIONS = [
  { key: "goon", title: "CE Goon Squad", note: "Go on offense / run around freely" },
  { key: "standby", title: "Standby (Fill as Needed)" },
  { key: "hover", title: "Hover Captains", note: "Make sure people get to hover station every round / notify when it's bounty time" },
  { key: "crystal", title: "Crystal Lab Captains", note: "Track open labs, share labs that need help" },
];

let planData = {};
let activeSquad = "";

function esc(s) { return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function toggleTheme() {
  const d = document.documentElement.getAttribute("data-theme") === "dark";
  document.documentElement.setAttribute("data-theme", d ? "light" : "dark");
  document.getElementById("themeIcon").textContent = d ? "\uD83C\uDF19" : "\u2600\uFE0F";
  document.getElementById("themeLabel").textContent = d ? "Dark Mode" : "Light Mode";
}

function buildTabs() {
  const container = document.querySelector(".squad-tabs");
  SQUADS.forEach(sq => {
    const btn = document.createElement("button");
    btn.className = "tab-btn";
    btn.textContent = SQUAD_SHORT[sq];
    btn.dataset.squad = sq;
    btn.onclick = () => selectSquad(sq);
    container.appendChild(btn);
  });
}

function selectSquad(sq) {
  activeSquad = sq;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.squad === sq));
  render();
}

function render() {
  const el = document.getElementById("content");
  const data = planData[activeSquad];

  if (!data || !hasAnyData(data)) {
    el.innerHTML = `<div class="empty-state"><h3>No battle plan yet</h3><p>No plan has been configured for ${esc(SQUAD_SHORT[activeSquad])} yet.</p></div>`;
    return;
  }

  el.innerHTML = `
    <div class="plan-layout">
      <div class="panel">
        <h3>Battle Map &mdash; ${esc(SQUAD_SHORT[activeSquad])}</h3>
        <div class="diamond-grid" id="mapGrid"></div>
      </div>
      <div class="panel">
        <h3>Roster Assignments</h3>
        ${SECTIONS.map(s => renderSection(s, data)).join("")}
        ${renderPositionSections(data)}
      </div>
    </div>
    ${data.notes ? `<div class="notes-card"><h3>Squad Notes</h3><div class="notes-body">${esc(data.notes)}</div></div>` : ""}
  `;

  renderMap(data);
}

function hasAnyData(d) {
  if (!d) return false;
  if (d.notes) return true;
  if (d.positions && Object.values(d.positions).some(v => v)) return true;
  for (const s of SECTIONS) { if (d[s.key] && d[s.key].some(v => v)) return true; }
  return false;
}

function renderMap(data) {
  const grid = document.getElementById("mapGrid");
  if (!grid) return;

  const hub = document.createElement("div");
  hub.className = "map-hub";
  hub.textContent = "Discarded Repository / Nexus Hub";
  grid.appendChild(hub);

  POSITIONS.forEach(pos => {
    const assigned = data.positions && data.positions[pos.num] || "";
    const node = document.createElement("div");
    node.className = "map-node" + (assigned ? " filled" : "");
    node.style.left = pos.x + "%";
    node.style.top = pos.y + "%";
    node.innerHTML = `
      <span class="num">${pos.num}</span>
      <span class="role">${esc(pos.role)}</span>
      ${assigned ? `<span class="player">${esc(assigned)}</span>` : ""}
    `;
    grid.appendChild(node);
  });
}

function renderPositionSections(data) {
  if (!data.positions) return "";
  return POS_GROUPS.map(g => {
    const filled = g.nums.filter(n => data.positions[n]);
    if (!filled.length) return "";
    const posInfo = POSITIONS.filter(p => g.nums.includes(p.num));
    return `
      <div class="assign-section">
        <div class="assign-title">${esc(g.title)}</div>
        <ul class="assign-list">
          ${posInfo.filter(p => data.positions[p.num]).map(p => `
            <li class="assign-item">
              <span class="slot-label">#${p.num}</span>
              <span class="slot-player">${esc(data.positions[p.num])}</span>
            </li>
          `).join("")}
        </ul>
      </div>
    `;
  }).join("");
}

function renderSection(sec, data) {
  const slots = data[sec.key] || [];
  const filled = slots.filter(v => v);
  if (!filled.length) return "";
  return `
    <div class="assign-section">
      <div class="assign-title">${esc(sec.title)}</div>
      <ul class="assign-list">
        ${slots.filter(v=>v).map((v, i) => `
          <li class="assign-item">
            <span class="slot-label">#${i + 1}</span>
            <span class="slot-player">${esc(v)}</span>
          </li>
        `).join("")}
      </ul>
      ${sec.note ? `<div class="assign-note">${esc(sec.note)}</div>` : ""}
    </div>
  `;
}

async function loadData() {
  try {
    const res = await fetch("battle-plan-data.json?t=" + Date.now());
    if (res.ok) planData = await res.json();
  } catch (e) { console.warn("Could not load plan data", e); }
}

async function init() {
  buildTabs();
  await loadData();
  if (SQUADS.length) selectSquad(SQUADS[0]);
}

init();
</script>
</body>
</html>
